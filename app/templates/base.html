<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{% block title %}Credanta{% endblock %}</title>
<link rel="icon" type="image/png" href="/static/credanta-logo.png" />
<script src="/static/theme.js?v=1"></script>
<link rel="stylesheet" href="/static/style.v5.css" />
</head>
<body>
{% if not public_view %}
<header class="topbar">
  <div class="container topbar-inner">
    <a href="/" class="brand">
      <img class="brand-logo" src="/static/credanta-wordmark-nobg.png" alt="Credanta" />
    </a>
    {% if user %}
    <nav class="nav">
      <a href="/dashboard" class="{% if request.url.path == '/dashboard' %}active{% endif %}">Dashboard</a>
      <a href="/documents" class="{% if request.url.path.startswith('/documents') %}active{% endif %}">Credentials</a>
      <a href="/premium" class="{% if request.url.path == '/premium' %}active{% endif %}">Premium</a>
      <span class="who">{{ user.email }}</span>
      <button type="button" class="btn small ghost theme-hit" data-theme-toggle title="Theme">◐</button>
      <form method="post" action="/logout" class="logout-form">
        <button type="submit" class="btn small ghost">Sign out</button>
      </form>
    </nav>
    {% else %}
    <button type="button" class="btn small ghost theme-hit" data-theme-toggle title="Theme">◐</button>
    {% endif %}
  </div>
</header>
{% endif %}

<main class="container main-pad">
  {% if flash %}<div class="flash">{{ flash }}</div>{% endif %}
  {% block content %}{% endblock %}
</main>

{% if user and not public_view %}
<nav class="bottom-nav" aria-label="Main navigation">
  <a href="/dashboard" class="bottom-nav-item {% if request.url.path == '/dashboard' %}active{% endif %}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Home
  </a>
  <a href="/documents" class="bottom-nav-item {% if request.url.path.startswith('/documents') %}active{% endif %}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
    Credentials
  </a>
  <a href="/premium" class="bottom-nav-item {% if request.url.path == '/premium' %}active{% endif %}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    Premium
  </a>
  <form method="post" action="/logout" style="margin:0;">
    <button type="submit" class="bottom-nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign out
    </button>
  </form>
</nav>
{% endif %}

</body>
</html>
