{% extends "base.html" %}
{% block title %}Set new password · Credanta{% endblock %}
{% block body_class %}auth-pg{% endblock %}
{% block content %}

<div class="auth-center">
  <div class="auth-card">

    <div class="auth-card-logo">
      <img src="/static/credanta-logo-full.png" alt="Credanta" />
    </div>

    <h1 class="auth-card-title">Set a new password</h1>
    <p class="auth-card-sub">Choose a strong password of at least 12 characters.</p>

    {% if flash %}
    <div class="auth-flash auth-flash--{{ flash_type or 'info' }}">{{ flash }}</div>
    {% endif %}

    <form class="auth-form" method="post" action="/auth/reset-password" novalidate>
      <input type="hidden" name="token" value="{{ token | e }}" />

      <div class="auth-field">
        <label for="password">New password <span class="auth-field-hint">min. 12 characters</span></label>
        <div class="auth-pw-wrap">
          <input
            id="password" name="password" type="password"
            placeholder="••••••••••••"
            autocomplete="new-password"
            minlength="12"
            required
          />
          <button type="button" class="auth-pw-toggle" id="pw-toggle" aria-label="Show password">
            <svg id="pw-eye-show" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="pw-eye-hide" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <div class="auth-field">
        <label for="confirm_password">Confirm new password</label>
        <div class="auth-pw-wrap">
          <input
            id="confirm_password" name="confirm_password" type="password"
            placeholder="••••••••••••"
            autocomplete="new-password"
            required
          />
          <button type="button" class="auth-pw-toggle" id="pw-confirm-toggle" aria-label="Show confirm password">
            <svg id="pw2-eye-show" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="pw2-eye-hide" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="auth-submit-btn">Update password</button>
    </form>

    <div class="auth-links">
      <a href="/login">← Back to sign in</a>
    </div>

  </div>
</div>

<script>
(function() {
  function makeToggle(btnId, fieldId, showId, hideId) {
    var btn   = document.getElementById(btnId);
    var field = document.getElementById(fieldId);
    var show  = document.getElementById(showId);
    var hide  = document.getElementById(hideId);
    if (!btn || !field) return;
    btn.addEventListener('click', function() {
      var isText = field.type === 'text';
      field.type = isText ? 'password' : 'text';
      show.style.display = isText ? '' : 'none';
      hide.style.display = isText ? 'none' : '';
      btn.setAttribute('aria-label', isText ? 'Show password' : 'Hide password');
    });
  }
  makeToggle('pw-toggle',         'password',         'pw-eye-show',  'pw-eye-hide');
  makeToggle('pw-confirm-toggle', 'confirm_password', 'pw2-eye-show', 'pw2-eye-hide');
})();
</script>
{% endblock %}
