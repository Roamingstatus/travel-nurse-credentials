{% extends "base.html" %}
{% block title %}Verify Identity — Credanta{% endblock %}
{% block content %}
<div class="challenge-wrap">
  <div class="challenge-card">
    <div class="challenge-icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h1 class="challenge-title">Verify your identity</h1>
    <p class="challenge-desc">This action requires two-step verification. Enter the 6-digit code from your authenticator app.</p>

    <form method="post" action="/security/mfa/challenge" class="challenge-form">
      <input type="hidden" name="next" value="{{ next_url }}" />
      <input
        type="text"
        name="code"
        class="challenge-code-input"
        inputmode="numeric"
        pattern="[0-9]{6}"
        maxlength="6"
        placeholder="000000"
        autocomplete="one-time-code"
        required
        autofocus
      />
      <button type="submit" class="btn primary challenge-submit">Verify</button>
    </form>

    <details class="challenge-recovery">
      <summary>Use a recovery code instead</summary>
      <form method="post" action="/security/mfa/challenge" class="challenge-form" style="margin-top:.75rem;">
        <input type="hidden" name="next" value="{{ next_url }}" />
        <input type="hidden" name="is_recovery" value="1" />
        <input
          type="text"
          name="code"
          class="challenge-code-input"
          placeholder="XXXXXX-XXXXXX"
          autocomplete="off"
          required
        />
        <button type="submit" class="btn ghost challenge-submit">Use recovery code</button>
      </form>
    </details>
  </div>
</div>

<style>
.challenge-wrap {
  display: flex;
  justify-content: center;
  padding: 3rem 1rem;
}
.challenge-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg, 12px);
  padding: 2.5rem 2rem;
  max-width: 380px;
  width: 100%;
  text-align: center;
}
.challenge-icon {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: var(--bg-subtle, #f3f4f6);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 1.25rem;
  color: var(--accent, #6366f1);
}
.challenge-title { font-size: 1.25rem; font-weight: 700; margin: 0 0 .5rem; }
.challenge-desc { font-size: .875rem; color: var(--text-muted); margin: 0 0 1.5rem; line-height: 1.5; }
.challenge-form { display: flex; flex-direction: column; gap: .75rem; align-items: center; }
.challenge-code-input {
  width: 160px;
  padding: .65rem .75rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--input-bg, var(--card-bg));
  color: var(--text);
  font-size: 1.3rem;
  letter-spacing: .3em;
  text-align: center;
}
.challenge-code-input:focus { outline: 2px solid var(--accent, #6366f1); }
.challenge-submit { width: 160px; justify-content: center; }
.challenge-recovery {
  margin-top: 1.5rem;
  font-size: .8rem;
  text-align: left;
}
.challenge-recovery summary {
  cursor: pointer;
  text-align: center;
  color: var(--text-muted);
  user-select: none;
}
.challenge-recovery .challenge-code-input {
  width: 100%;
  font-size: .95rem;
  letter-spacing: .05em;
}
.challenge-recovery .challenge-submit { width: 100%; }
</style>
{% endblock %}
